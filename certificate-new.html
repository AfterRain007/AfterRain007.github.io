    <script>
      var drawerclose = document.getElementById("drawerclose");
      if (drawerclose) {
        drawerclose.addEventListener("click", function (e) {
          var popup = e.currentTarget.parentNode;
          function isOverlay(node) {
            return !!(
              node &&
              node.classList &&
              node.classList.contains("popup-overlay")
            );
          }
          while (popup && !isOverlay(popup)) {
            popup = popup.parentNode;
          }
          if (isOverlay(popup)) {
            popup.style.display = "none";
          }
        });
      }
      
      var drawerhome = document.getElementById("drawerhome");
      if (drawerhome) {
        drawerhome.addEventListener("click", function () {
          window.location.href = "https://afterrain007.github.io/";
        });
      }
      
      var drawerhome = document.getElementById("drawerhome");
      if (drawerhome) {
        drawerhome.addEventListener("click", function (e) {
          var popup = e.currentTarget.parentNode;
          function isOverlay(node) {
            return !!(
              node &&
              node.classList &&
              node.classList.contains("popup-overlay")
            );
          }
          while (popup && !isOverlay(popup)) {
            popup = popup.parentNode;
          }
          if (isOverlay(popup)) {
            popup.style.display = "none";
          }
        });
      }
      
      var drawercertificationContainer = document.getElementById(
        "drawercertificationContainer"
      );
      if (drawercertificationContainer) {
        drawercertificationContainer.addEventListener("click", function (e) {
          window.location.href = "./certificate-new.html";
        });
      }
      var scrollAnimElements = document.querySelectorAll("[data-animate-on-scroll]");
      var observer = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting || entry.intersectionRatio > 0) {
              const targetElement = entry.target;
              targetElement.classList.add("animate");
              observer.unobserve(targetElement);
            }
          }
        },
        {
          threshold: 0.15,
        }
      );
      
      for (let i = 0; i < scrollAnimElements.length; i++) {
        observer.observe(scrollAnimElements[i]);
      }
      
      var homeText = document.getElementById("homeText");
      if (homeText) {
        homeText.addEventListener("click", function () {
          window.location.href = "https://afterrain007.github.io/";
        });
      }
      
      var resumeText = document.getElementById("resumeText");
      if (resumeText) {
        resumeText.addEventListener("click", function () {
          window.open(
            "https://drive.google.com/file/d/1yIwIyFa2kMHVO4iV8ypUsUcXclFJkJd3/view?usp=sharing"
          );
        });
      }
      
      var certificationText = document.getElementById("certificationText");
      if (certificationText) {
        certificationText.addEventListener("click", function () {
          var anchor = document.querySelector("[data-scroll-to='certificationText']");
          if (anchor) {
            anchor.scrollIntoView({ block: "start", behavior: "smooth" });
          }
        });
      }
      
      var hamburgerMenu = document.getElementById("hamburgerMenu");
      if (hamburgerMenu) {
        hamburgerMenu.addEventListener("click", function () {
          var drawerOverlay = document.getElementById("drawerMenu");
          if (!drawerOverlay) return;
          var drawerOverlayStyle = drawerOverlay.style;
          if (drawerOverlayStyle) {
            drawerOverlayStyle.display = "flex";
            drawerOverlayStyle.zIndex = 99;
            drawerOverlayStyle.backgroundColor = "rgba(113, 113, 113, 0.3)";
            drawerOverlayStyle.alignItems = "flex-end";
            drawerOverlayStyle.justifyContent = "";
          }
          drawerOverlay.setAttribute("closable", "");
      
          var onClick =
            drawerOverlay.onClick ||
            function (e) {
              if (
                e.target === drawerOverlay &&
                drawerOverlay.hasAttribute("closable")
              ) {
                drawerOverlayStyle.display = "none";
              }
            };
          drawerOverlay.addEventListener("click", onClick);
        });
      }
      
      var instagramLogoIcon = document.getElementById("instagramLogoIcon");
      if (instagramLogoIcon) {
        instagramLogoIcon.addEventListener("click", function () {
          window.open("https://www.instagram.com/razel007");
        });
      }
      
      var youtubeLogo = document.getElementById("youtubeLogo");
      if (youtubeLogo) {
        youtubeLogo.addEventListener("click", function () {
          window.open("https://www.youtube.com/@afterrain37/");
        });
      }
      
      var githubLogoIcon = document.getElementById("githubLogoIcon");
      if (githubLogoIcon) {
        githubLogoIcon.addEventListener("click", function () {
          window.open("https://github.com/AfterRain007/");
        });
      }
      
      var linkedinLogoIcon = document.getElementById("linkedinLogoIcon");
      if (linkedinLogoIcon) {
        linkedinLogoIcon.addEventListener("click", function () {
          window.open("https://www.linkedin.com/in/gilang-islamay-putra-djuharis/");
        });
      }
