<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./footer.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Venite Adoremus:wght@400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,900;1,400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap"
    />
  </head>
  <body>
    <div class="footer3">
      <div class="footer-child1"></div>
      <div class="lets-connect-container">
        <div class="lets-connect3">Let’s Connect!</div>
        <div class="social-media-logo3">
          <img
            class="instagram-logo-icon3"
            alt=""
            src="./public/instagram-logo.svg"
            id="instagramLogoIcon"
          />

          <img
            class="youtube-logo-icon3"
            alt=""
            src="./public/youtube-logo.svg"
            id="youtubeLogoIcon"
          />

          <img
            class="github-logo-icon3"
            alt=""
            src="./public/github-logo.svg"
            id="githubLogoIcon"
          />

          <img
            class="github-logo-icon3"
            alt=""
            src="./public/linkedin-logo@2x.png"
            id="linkedinLogoIcon"
          />
        </div>
      </div>
    </div>

    <script>
      var instagramLogoIcon = document.getElementById("instagramLogoIcon");
      if (instagramLogoIcon) {
        instagramLogoIcon.addEventListener("click", function () {
          window.open("https://www.instagram.com/razel007");
        });
      }
      
      var youtubeLogoIcon = document.getElementById("youtubeLogoIcon");
      if (youtubeLogoIcon) {
        youtubeLogoIcon.addEventListener("click", function () {
          window.open("https://www.youtube.com/@afterrain37/");
        });
      }
      
      var githubLogoIcon = document.getElementById("githubLogoIcon");
      if (githubLogoIcon) {
        githubLogoIcon.addEventListener("click", function () {
          window.open("https://github.com/AfterRain007/");
        });
      }
      
      var linkedinLogoIcon = document.getElementById("linkedinLogoIcon");
      if (linkedinLogoIcon) {
        linkedinLogoIcon.addEventListener("click", function () {
          window.open("https://www.linkedin.com/in/gilang-islamay-putra-djuharis/");
        });
      }
      </script>
  </body>
</html>
