<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./drawer-menu.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
    />

    <style>
      @font-face {
        font-family: "Venite Adoremus";
        src: url("./public/Venite Adoremus.otf");
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="drawer-menu" data-animate-on-scroll>
      <div class="menu">
        <div class="profile">
          <div class="group-3-wrapper">
            <img class="group-3-icon" alt="" src="./public/group3@2x.png" />
          </div>
          <div class="hello-parent">
            <div class="hello">Hello</div>
            <b class="macy-johnson">Macy Johnson</b>
          </div>
        </div>
        <div class="menu-child"></div>
        <div class="drawer-menu-items">
          <div class="iconlylightprofile-parent">
            <img
              class="iconlylightprofile"
              alt=""
              src="./public/iconlylightprofile.svg"
            />

            <img
              class="iconlylightprofile"
              alt=""
              src="./public/iconlylightfilter.svg"
            />

            <img
              class="iconlylightprofile"
              alt=""
              src="./public/iconlylightnotification.svg"
            />

            <img class="calender-icon" alt="" src="./public/calender.svg" />
          </div>
          <div class="home-parent">
            <div class="home1">HOME</div>
            <div class="home1">CERTIFICATION</div>
            <div class="home1">PASSIONS</div>
            <div class="home1">RESUME</div>
          </div>
        </div>
      </div>
      <div class="app-version-details">
        <div class="home1">App version 1.0.1</div>
      </div>
    </div>

    <script>
      var scrollAnimElements = document.querySelectorAll("[data-animate-on-scroll]");
      var observer = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting || entry.intersectionRatio > 0) {
              const targetElement = entry.target;
              targetElement.classList.add("animate");
              observer.unobserve(targetElement);
            }
          }
        },
        {
          threshold: 0.15,
        }
      );
      
      for (let i = 0; i < scrollAnimElements.length; i++) {
        observer.observe(scrollAnimElements[i]);
      }
      </script>
  </body>
</html>
